# Supabase CLI yerel geliştirme yapılandırması
# Kurulum: npx supabase login && npx supabase link --project-ref <PROJECT_ID>
# Migration: npx supabase db push
# Tip üretimi: npm run gen:types

project_id = "your-project-ref"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
enabled = true
schema_paths = []

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000/api/auth/callback"]

[storage]
enabled = true
file_size_limit = "50MiB"
